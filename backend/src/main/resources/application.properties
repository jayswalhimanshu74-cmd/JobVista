spring.application.name=JobVista

# ===============================
# DATABASE
# ===============================
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/jobvista}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:Himanshu}

spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ===============================
# JWT
# ===============================
jwt.secret=${JWT_SECRET_KEY:=H0gARN7pVgkuHye_glg72cye9ujEmWC8nGyDfW_hJc}
jwt.access-expiration=3000000
jwt.refresh-expiration=86400000
jwt.issuer=jobvista-backend

# ===============================
# EMAIL (GMAIL SMTP)
# ===============================
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${GMAIL_APP_PASSWORD:qsegxuajyefpijom}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# ===============================
# ADZUNA API
# ===============================
adzuna.app-id=${ADZUNA_APP_ID:70aee84d}
adzuna.app-key=${ADZUNA_APP_KEY:04e3619547538a174f327b5aa1e1f185}
