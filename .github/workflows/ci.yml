name: JobVista CI/CD

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  # ✅ Backend Build & Test
  backend:
    name: Backend Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Build backend
        working-directory: backend
        run: mvn clean package -DskipTests

      - name: Run tests
        working-directory: backend
        run: mvn test
        env:
          SPRING_DATASOURCE_URL: jdbc:h2:mem:testdb
          DB_USERNAME: sa
          DB_PASSWORD: password
          JWT_SECRET_KEY: test-secret-key-minimum-32-characters-long
          MAIL_USERNAME: test@test.com
          GMAIL_APP_PASSWORD: testpassword
          ADZUNA_APP_ID: test
          ADZUNA_APP_KEY: test

  # ✅ Frontend Build
  frontend:
    name: Frontend Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        run: npm run build
        env:
          VITE_API_BASE_URL: https://jobvista-psro.onrender.com/api/v1
          VITE_WS_URL: https://jobvista-psro.onrender.com
          VITE_IMAGE_BASE_URL: https://jobvista-psro.onrender.com

      - name: Run linter
        working-directory: frontend
        run: npm run lint --if-present
