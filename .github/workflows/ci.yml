name: JobVista CI/CD

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  backend:
    name: Backend Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Build backend
        working-directory: backend
        run: mvn clean package -DskipTests
        env:
          JWT_SECRET_KEY: test-secret-key-minimum-32-characters-long
          DB_PASSWORD: password
          MAIL_USERNAME: test@test.com
          GMAIL_APP_PASSWORD: testpassword
          ADZUNA_APP_ID: test
          ADZUNA_APP_KEY: test

  frontend:
    name: Frontend Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        working-directory: frontend
        run: npm install

      - name: Build frontend
        working-directory: frontend
        run: npm run build
        env:
          VITE_API_BASE_URL: https://jobvista-psro.onrender.com/api/v1
          VITE_WS_URL: https://jobvista-psro.onrender.com
          VITE_IMAGE_BASE_URL: https://jobvista-psro.onrender.com